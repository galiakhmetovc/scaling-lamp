# Copy to ~/.config/teamd/config.toml or point TEAMD_CONFIG at your own file.
# Sensitive values such as API keys can stay in the environment if preferred.

[daemon]
bind_host = "127.0.0.1"
bind_port = 5140
skills_dir = "skills"
worker_lease_owner = "daemon"
# bearer_token = "replace-me"
# public_base_url = "https://teamd.example"

[database]
# PostgreSQL is the canonical runtime control-plane store.
# Keep secrets in TEAMD_DATABASE_URL when possible.
url = "postgresql://teamd:teamd@127.0.0.1:5432/teamd"
connect_timeout_seconds = 5
application_name = "teamd"

[telegram]
enabled = false
# bot_token = "prefer TEAMD_TELEGRAM_BOT_TOKEN in .env"
# mode = "polling" keeps the legacy long polling worker. mode = "webhook"
# requires event_bus.required = true plus webhook_public_url/webhook_secret.
mode = "polling"
# webhook_public_url = "https://teamd.example/v1/telegram/webhook/replace-with-secret"
# webhook_secret = "replace-with-secret"
poll_interval_ms = 1000
poll_request_timeout_seconds = 50
progress_update_min_interval_ms = 1250
global_send_min_interval_ms = 42
private_chat_send_min_interval_ms = 1250
group_chat_send_min_interval_ms = 3750
pairing_token_ttl_seconds = 900
max_upload_bytes = 16777216
max_download_bytes = 41943040
private_chat_auto_create_session = true
group_require_mention = true
default_autoapprove = true
inbound_queue_default_mode = "coalesce"
inbound_coalesce_window_ms = 5000
inbound_min_coalesce_window_ms = 5000
message_text_soft_cap = 3276
caption_soft_cap = 819
status_detail_char_cap = 700
status_ttl_seconds = 1800
typing_initial_delay_ms = 750
typing_heartbeat_interval_seconds = 4
delivery_retry_attempts = 3
delivery_retry_base_delay_ms = 250
chat_turn_fast_settle_ms = 50

[event_bus]
# PostgreSQL remains the source of truth; NATS JetStream is the durable
# event backbone for webhook/MIMO runtime workers.
required = false
backend = "nats_jetstream"
# nats_url = "nats://127.0.0.1:4222"
input_stream = "TEAMD_INPUT"
session_stream = "TEAMD_SESSION"
delivery_stream = "TEAMD_DELIVERY"
task_stream = "TEAMD_TASK"
dlq_stream = "TEAMD_DLQ"

[provider]
kind = "openai_responses"
# api_base = "https://api.openai.com/v1"
# api_key = "replace-me"
# default_model = "gpt-5.4"
#
# Z.ai example:
# kind = "zai_chat_completions"
# api_base = "https://api.z.ai/api/coding/paas/v4"
# default_model = "glm-5-turbo"
connect_timeout_seconds = 15
# request_timeout_seconds = 3600
stream_idle_timeout_seconds = 1200
max_tool_rounds = 24
# max_output_tokens = 8192

[permissions]
mode = "default"

[session_defaults]
working_memory_limit = 128
project_memory_enabled = true

[workspace]
# Default project workspace for new sessions when the selected agent profile
# does not define its own default workspace root.
# default_root = "/srv/projects/example"

[context]
compaction_min_messages = 20
compaction_keep_tail_messages = 6
compaction_max_output_tokens = 4096
compaction_max_summary_chars = 12000
auto_compaction_trigger_ratio = 0.7
# Optional explicit context window override for auto-compaction.
# If omitted, runtime uses a built-in model mapping when it knows one.
# context_window_tokens_override = 200000

[observability]
# Disabled by default. deploy-teamd-containers.sh --with-jaeger enables these
# through /etc/teamd/teamd.env for production-like installs.
otlp_export_enabled = false
otlp_endpoint = "http://127.0.0.1:4318/v1/traces"
otlp_timeout_ms = 2000

[web]
search_backend = "duckduckgo_html"
search_url = "https://duckduckgo.com/html/"
# Local SearXNG example:
# search_backend = "searxng_json"
# search_url = "http://127.0.0.1:8888/search"

[mem0]
# Optional long-term semantic memory. Disabled by default so memory_* tools are
# hidden from models until a Mem0/OpenMemory REST endpoint is configured.
enabled = false
api_base = "http://127.0.0.1:18888"
# api_key = "prefer TEAMD_MEM0_API_KEY in .env"
default_user_id = "local-operator"
request_timeout_ms = 5000
default_limit = 10
max_limit = 50

[knowledge]
# Operator context and optional SilverBullet integration used by canonical
# prompt SessionHead and best-effort human-readable session mirrors.
# knowledge_search/knowledge_read use only the configured source_files/source_dirs
# below, relative to the agent workspace. They are a canonical docs/workspace
# knowledge index, not arbitrary filesystem search, not Mem0, and not SilverBullet.
# Unreadable/stale/non-UTF8 files are skipped during indexing.
operator_timezone = "Europe/Moscow"
silverbullet_space_dir = "/var/lib/teamd/knowledge/silverbullet/teamd"
# silverbullet_base_url = "https://teamd.example/sb"
silverbullet_journal_context_enabled = true
silverbullet_mirror_enabled = true
silverbullet_session_area_path = "a/teamd-agents.md"
silverbullet_text_artifact_extensions = [
  "bash", "css", "csv", "html", "js", "json", "lua", "md", "py", "rs",
  "sh", "sql", "toml", "ts", "txt", "xml", "yaml", "yml",
]
silverbullet_script_artifact_extensions = ["bash", "js", "lua", "py", "rs", "sh", "ts"]
allowed_extensions = ["md", "txt", "json", "yaml", "yml", "toml"]

[[knowledge.source_files]]
path = "README.md"
root = "root_docs"
kind = "root_doc"

[[knowledge.source_files]]
path = "SYSTEM.md"
root = "root_docs"
kind = "root_doc"

[[knowledge.source_files]]
path = "AGENTS.md"
root = "root_docs"
kind = "root_doc"

[[knowledge.source_dirs]]
path = "docs"
root = "docs"
kind = "project_doc"

[[knowledge.source_dirs]]
path = "projects"
root = "projects"
kind = "project_doc"

[[knowledge.source_dirs]]
path = "notes"
root = "notes"
kind = "project_note"

[browser]
# Disabled by default. deploy-teamd-containers.sh --with-browserless enables
# this through /etc/teamd/teamd.env for production-like installs.
enabled = false
command = "agent-browser"
provider = "cdp"
session_prefix = "teamd"
default_timeout_ms = 30000
max_output_chars = 20000

[browser.browserless]
api_url = "http://127.0.0.1:3000"
cdp_url = "ws://127.0.0.1:3000/chromium?token=<token>"
# api_key = "prefer TEAMD_BROWSERLESS_API_KEY in .env"
browser_type = "chromium"
ttl_ms = 300000
stealth = true

[runtime_timing]
store_retry_delay_ms = 250
daemon_http_connect_timeout_ms = 2000
daemon_http_request_timeout_ms = 5000
a2a_http_connect_timeout_ms = 2000
autospawn_status_poll_attempts = 50
autospawn_status_poll_interval_ms = 100
shutdown_wait_poll_attempts = 50
shutdown_wait_poll_interval_ms = 50
restart_stop_poll_attempts = 60
restart_stop_poll_interval_ms = 50
restart_stop_required_unavailable_probes = 3
http_server_request_poll_interval_ms = 100
daemon_test_startup_probe_attempts = 50
daemon_test_startup_probe_interval_ms = 20
daemon_background_worker_tick_interval_ms = 100
daemon_background_worker_lease_seconds = 60
tui_event_poll_interval_ms = 100
tui_active_run_heartbeat_notice_interval_seconds = 30
mcp_stdio_command_poll_interval_ms = 100
provider_loop_transient_retry_base_delay_ms = 100

[runtime_limits]
diagnostic_tail_lines = 80
store_retry_attempts = 4
active_run_step_tail_limit = 3
active_process_output_tail_max_bytes = 2048
active_process_output_tail_max_lines = 8
transcript_tail_run_limit = 32
agent_list_default_limit = 100
agent_list_max_limit = 1000
schedule_list_default_limit = 100
schedule_list_max_limit = 1000
mcp_search_default_limit = 20
mcp_search_max_limit = 100
session_search_default_limit = 20
session_search_max_limit = 100
session_read_default_max_items = 20
session_read_max_items = 200
session_read_default_max_bytes = 8192
session_read_max_bytes = 65536
knowledge_search_default_limit = 20
knowledge_search_max_limit = 100
knowledge_read_excerpt_default_max_lines = 40
knowledge_read_full_default_max_lines = 200
knowledge_read_max_lines = 400
knowledge_read_default_max_bytes = 8192
knowledge_read_max_bytes = 65536
operator_user_context_max_chars = 4096
silverbullet_journal_context_max_chars_per_day = 4096
silverbullet_mirror_text_artifact_max_chars = 24576
silverbullet_mirror_script_max_chars = 24576
session_warm_idle_seconds = 3600
timeline_preview_chars = 160
fs_list_default_limit = 200
fs_list_max_limit = 1000
process_output_read_default_max_bytes = 4096
process_output_read_max_bytes = 32768
process_output_read_default_max_lines = 20
process_output_read_max_lines = 200
process_wait_default_timeout_ms = 600000
process_wait_max_timeout_ms = 3600000
process_wait_poll_interval_ms = 50
process_terminate_grace_ms = 500
process_reader_drain_grace_ms = 200
provider_loop_max_transient_retries = 3
provider_loop_max_identical_tool_call_repeats = 3
provider_loop_max_empty_response_recoveries = 1
tool_result_preview_char_limit = 16384
offload_max_context_refs = 16
offload_inline_tool_output_token_limit = 512
offload_inline_find_in_files_preview_limit = 6
artifact_read_default_max_bytes = 8192
artifact_read_max_bytes = 32768
kv_list_default_limit = 50
kv_list_max_limit = 500
kv_key_max_bytes = 512
kv_value_max_bytes = 65536
kv_metadata_max_bytes = 16384
skill_list_default_limit = 64
skill_list_max_limit = 256
skill_read_default_max_bytes = 16384
skill_read_max_bytes = 131072
autonomy_state_default_max_items = 8
autonomy_state_max_items = 50
prompt_recent_filesystem_activity_limit = 6
prompt_recent_process_activity_limit = 6
prompt_workspace_tree_limit = 12
interagent_default_max_hops = 3
