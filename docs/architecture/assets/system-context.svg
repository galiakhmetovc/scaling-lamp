<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">teamD Runtime - C4 System Context</title>
  <desc id="desc">C4 System Context diagram for teamD Runtime. Orthogonal relationship lines are routed around all blocks.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#56616f" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#17202a" flood-opacity="0.18" />
    </filter>
    <style>
      .canvas { fill: #f8fafc; }
      .node { stroke-width: 2; filter: url(#shadow); }
      .person { fill: #084c61; stroke: #063847; }
      .system { fill: #177e89; stroke: #0f5f68; }
      .external { fill: #f4d35e; stroke: #c59f28; }
      .host { fill: #ffffff; stroke: #697386; }
      .node-title { font-family: DejaVu Sans, Arial, sans-serif; font-weight: 700; font-size: 18px; }
      .node-desc { font-family: DejaVu Sans, Arial, sans-serif; font-size: 13px; }
      .light-text { fill: #ffffff; }
      .dark-text { fill: #17202a; }
      .edge { fill: none; stroke: #56616f; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .edge.secondary { stroke: #7a8796; stroke-width: 2.1; }
      .label-bg { fill: #ffffff; stroke: #d7dde5; stroke-width: 1; rx: 6; }
      .rel-label { font-family: DejaVu Sans, Arial, sans-serif; font-size: 12px; fill: #24313f; }
      .caption { font-family: DejaVu Sans, Arial, sans-serif; font-size: 15px; font-weight: 700; fill: #24313f; }
    </style>
  </defs>

  <rect class="canvas" x="0" y="0" width="1100" height="720" rx="18" />

  <text class="caption" x="550" y="38" text-anchor="middle">C4 Level 1: System Context</text>

  <!-- External systems -->
  <g>
    <rect class="node external" x="55" y="70" width="190" height="86" rx="14" />
    <text class="node-title dark-text" x="150" y="105" text-anchor="middle">LLM Provider</text>
    <text class="node-desc dark-text" x="150" y="130" text-anchor="middle">API модели</text>
  </g>

  <g>
    <rect class="node external" x="305" y="70" width="190" height="86" rx="14" />
    <text class="node-title dark-text" x="400" y="105" text-anchor="middle">Telegram Bot API</text>
    <text class="node-desc dark-text" x="400" y="130" text-anchor="middle">chat и notifications</text>
  </g>

  <g>
    <rect class="node external" x="555" y="70" width="190" height="86" rx="14" />
    <text class="node-title dark-text" x="650" y="105" text-anchor="middle">MCP Servers</text>
    <text class="node-desc dark-text" x="650" y="130" text-anchor="middle">tools/resources/prompts</text>
  </g>

  <g>
    <rect class="node external" x="805" y="70" width="190" height="86" rx="14" />
    <text class="node-title dark-text" x="900" y="105" text-anchor="middle">GitHub Releases</text>
    <text class="node-desc dark-text" x="900" y="130" text-anchor="middle">self-update</text>
  </g>

  <!-- Main row -->
  <g>
    <rect class="node person" x="70" y="310" width="205" height="105" rx="16" />
    <text class="node-title light-text" x="172.5" y="348" text-anchor="middle">Operator</text>
    <text class="node-desc light-text" x="172.5" y="374" text-anchor="middle">пользователь, разработчик</text>
  </g>

  <g>
    <rect class="node system" x="435" y="295" width="250" height="135" rx="18" />
    <text class="node-title light-text" x="560" y="340" text-anchor="middle">teamD Runtime</text>
    <text class="node-desc light-text" x="560" y="368" text-anchor="middle">локальный runtime</text>
    <text class="node-desc light-text" x="560" y="390" text-anchor="middle">для AI-агентов</text>
  </g>

  <g>
    <rect class="node host" x="825" y="310" width="215" height="105" rx="16" />
    <text class="node-title dark-text" x="932.5" y="348" text-anchor="middle">Local Host</text>
    <text class="node-desc dark-text" x="932.5" y="374" text-anchor="middle">workspace, OS, SQLite</text>
  </g>

  <!-- Orthogonal relationships. Routing lanes intentionally avoid all node rectangles. -->
  <path class="edge" d="M 275 362 H 435" />
  <rect class="label-bg" x="296" y="328" width="118" height="24" />
  <text class="rel-label" x="355" y="345" text-anchor="middle">CLI/TUI/HTTP</text>

  <path class="edge" d="M 685 362 H 825" />
  <rect class="label-bg" x="710" y="328" width="90" height="24" />
  <text class="rel-label" x="755" y="345" text-anchor="middle">state/files</text>

  <path class="edge secondary" d="M 172.5 415 V 570 H 932.5 V 415" />
  <rect class="label-bg" x="450" y="556" width="210" height="24" />
  <text class="rel-label" x="555" y="573" text-anchor="middle">запускает agentd, правит config</text>

  <path class="edge" d="M 560 295 V 230 H 150 V 156" />
  <rect class="label-bg" x="113" y="204" width="74" height="24" />
  <text class="rel-label" x="150" y="221" text-anchor="middle">requests</text>

  <path class="edge" d="M 560 295 V 230 H 400 V 156" />
  <rect class="label-bg" x="362" y="204" width="76" height="24" />
  <text class="rel-label" x="400" y="221" text-anchor="middle">updates</text>

  <path class="edge" d="M 560 295 V 230 H 650 V 156" />
  <rect class="label-bg" x="616" y="204" width="68" height="24" />
  <text class="rel-label" x="650" y="221" text-anchor="middle">tools</text>

  <path class="edge" d="M 560 295 V 230 H 900 V 156" />
  <rect class="label-bg" x="850" y="204" width="100" height="24" />
  <text class="rel-label" x="900" y="221" text-anchor="middle">updates</text>

  <text class="node-desc dark-text" x="550" y="675" text-anchor="middle">Каноническая модель: docs/architecture/workspace.dsl, view SystemContext</text>
</svg>
