name: Build Agent Artifact

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - rewrite/clean-room-root

jobs:
  build-agent:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: teamd-agent-linux-amd64
            output_name: teamd-agent-linux-amd64
          - goos: windows
            goarch: amd64
            artifact_name: teamd-agent-windows-amd64
            output_name: teamd-agent-windows-amd64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./cmd/agent ./internal/runtime ./internal/provider ./internal/config ./internal/contracts ./internal/policies ./internal/runtime/projections -count=1

      - name: Build agent binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ matrix.output_name }} ./cmd/agent

      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_name }}
          if-no-files-found: error
