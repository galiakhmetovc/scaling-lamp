kind: FilesystemCatalogPolicyConfig
version: v1
id: filesystem-catalog-zai-smoke
spec:
  enabled: true
  strategy: static_allowlist
  params:
    tool_ids:
      - fs_list
      - fs_read_text
      - fs_write_text
      - fs_patch_text
      - fs_mkdir
      - fs_move
    allow_empty: false
    dedupe: true
