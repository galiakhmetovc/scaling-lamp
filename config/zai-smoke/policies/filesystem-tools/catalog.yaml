kind: FilesystemCatalogPolicyConfig
version: v1
id: filesystem-catalog-zai-smoke
spec:
  enabled: true
  strategy: static_allowlist
  params:
    tool_ids:
      - fs_list
      - fs_read_lines
      - fs_search_text
      - fs_find_in_files
      - fs_replace_in_line
      - fs_replace_lines
      - fs_insert_text
      - fs_replace_in_files
      - fs_mkdir
      - fs_move
      - fs_trash
    allow_empty: false
    dedupe: true
