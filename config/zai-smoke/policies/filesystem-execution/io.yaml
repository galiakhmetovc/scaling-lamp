kind: FilesystemIOPolicyConfig
version: v1
id: filesystem-io-zai-smoke
spec:
  enabled: true
  strategy: bounded_text_io
  params:
    max_read_bytes: 131072
    max_write_bytes: 131072
    max_search_files: 64
    max_search_hits: 200
    max_replace_files: 32
    max_replace_hits: 200
    encoding: utf-8
