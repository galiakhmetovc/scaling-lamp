kind: ToolCatalogPolicyConfig
version: v1
id: tool-catalog-zai-smoke
spec:
  enabled: true
  strategy: static_allowlist
  params:
    tool_ids:
      - init_plan
      - add_task
      - set_task_status
      - add_task_note
      - edit_task
      - fs_list
      - fs_read_text
      - fs_write_text
      - fs_patch_text
      - fs_mkdir
      - fs_move
      - artifact_read
      - artifact_search
      - shell_exec
      - shell_start
      - shell_poll
      - shell_kill
      - delegate_spawn
      - delegate_message
      - delegate_wait
      - delegate_close
      - delegate_handoff
    allow_empty: false
    dedupe: true
