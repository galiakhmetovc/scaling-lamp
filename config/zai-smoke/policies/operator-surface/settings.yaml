kind: SettingsSurfacePolicyConfig
version: v1
id: settings-surface-zai-smoke
spec:
  enabled: true
  strategy: revisioned_yaml_files
  params:
    require_idle_for_apply: true
    form_fields:
      - key: model
        label: Model
        type: string
        file_path: policies/request-shape/model.yaml
        yaml_path: [spec, params, model]
        enum: [glm-5-turbo, glm-4.6]
      - key: reasoning_effort
        label: Thinking
        type: string
        file_path: policies/request-shape/sampling.yaml
        yaml_path: [spec, params, reasoning_effort]
        enum: [minimal, low, medium, high]
      - key: approval_mode
        label: Approval Mode
        type: string
        file_path: policies/tool-execution/approval.yaml
        yaml_path: [spec, strategy]
        enum: [always_allow, always_require, require_for_destructive]
      - key: allow_network
        label: Network
        type: bool
        file_path: policies/tool-execution/sandbox.yaml
        yaml_path: [spec, params, allow_network]
      - key: max_tool_rounds
        label: Max Tool Rounds
        type: int
        file_path: agent.yaml
        yaml_path: [spec, runtime, max_tool_rounds]
      - key: render_markdown
        label: Render Markdown
        type: bool
        file_path: policies/chat/output.yaml
        yaml_path: [spec, params, render_markdown]
      - key: markdown_style
        label: Markdown Style
        type: string
        file_path: policies/chat/output.yaml
        yaml_path: [spec, params, markdown_style]
        enum: [dark, light]
      - key: show_tool_calls
        label: Show Tool Calls
        type: bool
        file_path: policies/chat/status.yaml
        yaml_path: [spec, params, show_tool_calls]
      - key: show_tool_results
        label: Show Tool Results
        type: bool
        file_path: policies/chat/status.yaml
        yaml_path: [spec, params, show_tool_results]
      - key: show_plan_after_plan_tools
        label: Show Plan After Plan Tools
        type: bool
        file_path: policies/chat/status.yaml
        yaml_path: [spec, params, show_plan_after_plan_tools]
    quick_controls:
      - key: model
        surface: chat
        order: 1
        apply_scope: next_run
      - key: reasoning_effort
        surface: chat
        order: 2
        apply_scope: next_run
      - key: approval_mode
        surface: chat
        order: 3
        apply_scope: next_run
      - key: allow_network
        surface: chat
        order: 4
        apply_scope: next_run
    raw_file_globs:
      - agent.yaml
      - contracts/*.yaml
      - policies/**/*.yaml
