kind: DaemonServerPolicyConfig
version: v1
id: daemon-server-zai-smoke
spec:
  enabled: true
  strategy: websocket_http
  params:
    listen_host: 0.0.0.0
    listen_port: 8080
    enable_websocket: true
    public_base_url: ""
    allowed_origins: []
    initial_chat_history_limit: 40
    log_format: json
    log_level: info
    log_add_source: false
