kind: ShellCommandPolicyConfig
version: v1
id: shell-command-zai-smoke
spec:
  enabled: true
  strategy: static_allowlist
  params:
    allowed_commands:
      - pwd
      - ls
      - cat
      - rg
      - go
      - git
      - echo
      - printf
      - head
      - sed
      - wc
      - find
    allowed_prefixes: []
    deny_patterns:
      - " rm "
      - " curl "
      - " wget "
