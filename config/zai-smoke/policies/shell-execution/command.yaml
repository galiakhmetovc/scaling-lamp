kind: ShellCommandPolicyConfig
version: v1
id: shell-command-zai-smoke
spec:
  enabled: true
  strategy: static_allowlist
  params:
    allowed_commands:
      - pwd
      - ls
      - cat
      - rg
      - go
      - git
      - echo
      - printf
      - head
      - sed
      - wc
      - find
    allowed_prefixes: []
    deny_patterns:
      - " rm "
      - " curl "
      - " wget "
    command_rules:
      - command: go
        allowed_arg_prefixes:
          - test
          - build
          - env
          - version
          - list
        denied_arg_patterns:
          - "env -w"
      - command: git
        allowed_arg_prefixes:
          - status
          - diff
          - log
          - rev-parse
          - branch
        denied_arg_patterns:
          - push
          - "reset --hard"
