kind: AgentConfig
version: v1
id: zai-smoke
spec:
  runtime:
    event_log: file_jsonl
    event_log_path: ../../var/zai-smoke/events.jsonl
    projection_store_path: ../../var/zai-smoke/projections.json
    max_tool_rounds: 100
    prompt_assembly_executor: prompt_assembly_default
    prompt_asset_executor: prompt_asset_default
    transport_executor: transport_default
    request_shape_executor: request_shape_default
    tool_catalog_executor: tool_catalog_default
    tool_execution_gate: tool_execution_default
    provider_client: provider_client_default
    projections:
      - session
      - session_catalog
      - run
      - transcript
      - chat_timeline
      - delegate
      - shell_command
      - active_plan
      - plan_archive
      - plan_head
  contracts:
    transport: ./contracts/transport.yaml
    request_shape: ./contracts/request-shape.yaml
    memory: ./contracts/memory.yaml
    prompt_assets: ./contracts/prompt-assets.yaml
    prompt_assembly: ./contracts/prompt-assembly.yaml
    tools: ./contracts/tools.yaml
    filesystem_tools: ./contracts/filesystem-tools.yaml
    filesystem_execution: ./contracts/filesystem-execution.yaml
    shell_tools: ./contracts/shell-tools.yaml
    shell_execution: ./contracts/shell-execution.yaml
    delegation_tools: ./contracts/delegation-tools.yaml
    delegation_execution: ./contracts/delegation-execution.yaml
    plan_tools: ./contracts/plan-tools.yaml
    tool_execution: ./contracts/tool-execution.yaml
    provider_trace: ./contracts/provider-trace.yaml
    chat: ./contracts/chat.yaml
