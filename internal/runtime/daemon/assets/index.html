<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>teamD daemon</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1720;
        --panel: #16202b;
        --muted: #8ea2b5;
        --text: #e8eef4;
        --line: #253342;
        --accent: #7dd3fc;
        --ok: #86efac;
      }
      body {
        margin: 0;
        font: 14px/1.5 ui-sans-serif, system-ui, sans-serif;
        background: linear-gradient(180deg, #0b1117 0%, #0f1720 100%);
        color: var(--text);
      }
      header, main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px;
      }
      header h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }
      .muted { color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .panel {
        background: rgba(22, 32, 43, 0.92);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 16px;
      }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font: 12px/1.5 ui-monospace, SFMono-Regular, monospace;
      }
      ul { margin: 0; padding-left: 18px; }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--accent);
        margin-right: 8px;
      }
      .ok { color: var(--ok); }
    </style>
  </head>
  <body>
    <header>
      <h1>teamD daemon</h1>
      <div class="muted">Phase 1 control plane shell. Bootstrap and live UI bus events are active.</div>
    </header>
    <main class="grid">
      <section class="panel">
        <div id="summary" class="muted">Loading bootstrap…</div>
        <div style="margin-top: 12px">
          <span class="pill" id="listenAddr">listen: -</span>
          <span class="pill" id="transportMode">transport: websocket</span>
          <span class="pill" id="assetsMode">assets: -</span>
        </div>
      </section>
      <section class="panel">
        <strong>Sessions</strong>
        <ul id="sessions" style="margin-top: 12px"></ul>
      </section>
      <section class="panel" style="grid-column: 1 / -1">
        <strong>Live Events</strong>
        <div class="muted" style="margin: 6px 0 12px">Subscribed to daemon UI bus over WebSocket.</div>
        <pre id="events"></pre>
      </section>
    </main>
    <script src="/config.js"></script>
    <script src="/app.js"></script>
  </body>
  </html>
